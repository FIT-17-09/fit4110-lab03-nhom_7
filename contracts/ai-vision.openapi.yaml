openapi: 3.0.3
info:
  title: AI Vision Service API (B4)
  description: |
    API tiếp nhận luồng ảnh từ Camera (B2). Sử dụng kiến trúc Asynchronous (Fire-and-forget),
    kết quả AI sẽ được phát tán ngầm qua Webhook sang Analytics (B5) và Core Business (B6).
  version: 2.0.0
  contact:
    name: AI Vision Team
    email: aivision@example.com
servers:
  - url: http://localhost:8000
    description: Local server
security:
  - BearerAuth: []
tags:
  - name: system
    description: Health and status
  - name: vision
    description: Image analysis
paths:
  /health:
    get:
      tags: [system]
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Public health check để kiểm tra service sẵn sàng.
      security: []
      responses:
        "200":
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: ai-vision
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-22T09:00:00.000000Z"

  /api/v1/vision/analyze:
    post:
      tags: [vision]
      operationId: analyzeCameraFrame
      summary: Nạp ảnh vào hàng đợi phân tích AI
      description: |
        Tiếp nhận ảnh từ B2, trả về 202 Accepted ngay lập tức để không làm nghẽn luồng Camera.
        Quá trình chạy YOLOv8 diễn ra ngầm.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [camera_id, image_url, timestamp, correlationId]
              properties:
                camera_id:
                  type: string
                  example: cam-gate-01-entry
                image_url:
                  type: string
                  format: uri
                  example: https://ultralytics.com/images/bus.jpg
                timestamp:
                  type: string
                  format: date-time
                  example: "2026-05-22T10:30:00Z"
                correlationId:
                  type: string
                  description: Chuỗi truy vết để đồng bộ log xuyên suốt hệ thống microservice.
                  example: corr-unique-string-12345
      responses:
        "202":
          description: Đã tiếp nhận và đưa vào hàng đợi ngầm.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: received
                  message:
                    type: string
                    example: Ảnh đã được đưa vào hàng đợi xử lý ngầm.
        "400":
          description: Dữ liệu đầu vào không hợp lệ (Lỗi chuẩn RFC 9457)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Thiếu hoặc sai Bearer Token
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "500":
          description: Lỗi từ phía server (Tràn bộ nhớ / Lỗi cấu hình)
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProblemDetails:
      type: object
      description: Error model compatible with RFC 7807/9457.
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
